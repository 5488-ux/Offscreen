name: Offscreen
options:
  bundleIdPrefix: com.offscreen
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: app.mango7143.offscreen
    MARKETING_VERSION: 0.1
    CURRENT_PROJECT_VERSION: 1
targets:
  Offscreen:
    type: application
    platform: iOS
    sources:
      - path: Offscreen
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Offscreen
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.healthcare-fitness
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSFaceIDUsageDescription: Unlock local Offscreen settings.
        INFOPLIST_KEY_NSHealthShareUsageDescription: Offscreen uses Apple Health activity data to calculate small screen-time rewards.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Offscreen lets you attach one daily reflection image.
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          DEVELOPMENT_TEAM: $(IOS_TEAM_ID)
          PRODUCT_BUNDLE_IDENTIFIER: $(IOS_BUNDLE_ID)
          PROVISIONING_PROFILE_SPECIFIER: $(IOS_PROFILE_NAME)
    scheme:
      testTargets: []

