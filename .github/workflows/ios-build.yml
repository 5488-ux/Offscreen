name: ios-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    env:
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
      IOS_CERT_PEM_BASE64: ${{ secrets.IOS_CERT_PEM_BASE64 }}
      IOS_KEY_PEM_BASE64: ${{ secrets.IOS_KEY_PEM_BASE64 }}
      EXPECTED_IOS_BUNDLE_ID: app.mango7143.offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Verify Xcode 26 and iOS 26 SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -showsdks | grep -q 'iphoneos26'
          xcodebuild -showsdks | grep -q 'iphonesimulator26'

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild \
            -project Offscreen.xcodeproj \
            -scheme Offscreen \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Verify signing bundle id
        if: ${{ env.IOS_MOBILEPROVISION_BASE64 != '' || env.IOS_BUNDLE_ID != '' || env.IOS_PROFILE_NAME != '' }}
        run: |
          if [ "$IOS_BUNDLE_ID" != "$EXPECTED_IOS_BUNDLE_ID" ]; then
            echo "Signing bundle id must be $EXPECTED_IOS_BUNDLE_ID, got $IOS_BUNDLE_ID."
            echo "Create an Offscreen provisioning profile and update IOS_BUNDLE_ID, IOS_PROFILE_NAME, and IOS_MOBILEPROVISION_BASE64."
            exit 1
          fi

      - name: Prepare signing assets
        if: ${{ env.IOS_CERT_PEM_BASE64 != '' && env.IOS_KEY_PEM_BASE64 != '' && env.IOS_MOBILEPROVISION_BASE64 != '' && env.IOS_TEAM_ID != '' && env.IOS_BUNDLE_ID != '' && env.IOS_PROFILE_NAME != '' }}
        run: |
          mkdir -p $RUNNER_TEMP/signing
          printf '%s' "$IOS_CERT_PEM_BASE64" | base64 --decode > $RUNNER_TEMP/signing/certificate.pem
          printf '%s' "$IOS_KEY_PEM_BASE64" | base64 --decode > $RUNNER_TEMP/signing/private_key.pem
          printf '%s' "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > $RUNNER_TEMP/signing/profile.mobileprovision

          security create-keychain -p runner build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p runner build.keychain
          security import $RUNNER_TEMP/signing/certificate.pem -k build.keychain -T /usr/bin/codesign
          security import $RUNNER_TEMP/signing/private_key.pem -k build.keychain -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k runner build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/signing/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive app
        if: ${{ env.IOS_CERT_PEM_BASE64 != '' && env.IOS_KEY_PEM_BASE64 != '' && env.IOS_MOBILEPROVISION_BASE64 != '' && env.IOS_TEAM_ID != '' && env.IOS_BUNDLE_ID != '' && env.IOS_PROFILE_NAME != '' }}
        run: |
          xcodebuild \
            -project Offscreen.xcodeproj \
            -scheme Offscreen \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Offscreen.xcarchive \
            IOS_TEAM_ID=$IOS_TEAM_ID \
            IOS_BUNDLE_ID=$IOS_BUNDLE_ID \
            IOS_PROFILE_NAME="$IOS_PROFILE_NAME" \
            archive

      - name: Export IPA
        if: ${{ env.IOS_CERT_PEM_BASE64 != '' && env.IOS_KEY_PEM_BASE64 != '' && env.IOS_MOBILEPROVISION_BASE64 != '' && env.IOS_TEAM_ID != '' && env.IOS_BUNDLE_ID != '' && env.IOS_PROFILE_NAME != '' }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Offscreen.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload build context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offscreen-build-context
          path: |
            Offscreen.xcodeproj
            project.yml

      - name: Upload IPA
        if: ${{ success() && env.IOS_CERT_PEM_BASE64 != '' && env.IOS_KEY_PEM_BASE64 != '' && env.IOS_MOBILEPROVISION_BASE64 != '' && env.IOS_TEAM_ID != '' && env.IOS_BUNDLE_ID != '' && env.IOS_PROFILE_NAME != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: offscreen-ipa
          path: ${{ runner.temp }}/export/*.ipa
